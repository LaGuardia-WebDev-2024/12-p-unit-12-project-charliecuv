<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <center>
    <h1>s h a r k</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        sharks? what is my favorite?
        <select id="movie-answer">
          <option value="movie1">greenland shark</option>
          <option value="movie2">great white</option>
          <option value="movie3">hammerhead</option>
          <option value="movie4">cookie cutter sharks</option>
        </select>
      </label>
      <button type="submit"><3</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        how long does my favorite shark live for
        <select id="book-answer">
          <option value="book1">20 yrs</option>
          <option value="book2">500+ yrs</option>
          <option value="book3">1000 yrs</option>
          <option value="book4">70 yrs</option>
        </select>
      </label>
      <button type="submit"><3</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie1") {
          $("#movie-text").text("love em to death");
        } 
        else {
          $("#movie-text").text("sorry :( still love them tho");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book2") {
          $("#book-text").text(";3");
        } 
        else {
          $("#book-text").text("wayyyyy off");
        }
      });
      
    </script>
    </center>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
